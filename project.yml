name: MDPeek
options:
  bundleIdPrefix: com.thekaystudio.mdpeek
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
targets:
  MDPeek:
    type: application
    platform: macOS
    sources:
      - path: MDPeek
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thekaystudio.mdpeek
        INFOPLIST_FILE: MDPeek/Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
    entitlements:
      path: MDPeek/MDPeek.entitlements
      properties:
        com.apple.security.app-sandbox: true
    dependencies:
      - target: MDPeekQL
  MDPeekQL:
    type: app-extension
    platform: macOS
    sources:
      - path: MDPeekQL
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thekaystudio.mdpeek.MDPeekQL
        INFOPLIST_FILE: MDPeekQL/Info.plist
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: MDPeekQL/MDPeekQL.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.network.client: true
  MDPeekQLTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MDPeekQLTests
      - path: MDPeekQL
        excludes:
          - "Resources/**"
          - "*.plist"
          - "*.entitlements"
    dependencies:
      - target: MDPeekQL
